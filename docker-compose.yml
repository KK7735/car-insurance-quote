services:
  db:
    image: postgres:16-alpine
    container_name: car_insurance_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: car_insurance
      TZ: Asia/Tokyo
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d car_insurance"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car_insurance_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/car_insurance
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      TZ: Asia/Tokyo
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car_insurance_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      TZ: Asia/Tokyo

volumes:
  pgdata:
